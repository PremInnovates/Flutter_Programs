name: anjaligeneralstore
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI icons
  cupertino_icons: ^1.0.8

  # Local storage
  shared_preferences: ^2.1.0

  # Google Sign-In
  google_sign_in: ^6.3.0

  # Firebase core
  firebase_core: ^3.15.2       # 3.x version

  # Firebase authentication
  firebase_auth: ^5.7.0        # 🔹 Upgrade to 5.x

  # Firestore (optional, in case you want to store data)
  cloud_firestore: ^5.3.0

  # Localization support
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lint rules
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/db.json
